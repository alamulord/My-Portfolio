<!doctype html>
<html lang="en">
  <head>

    <link rel="icon" type="image/svg+xml" href="/macbook.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Aliyu Abdulsamad Ayomide – Frontend Developer portfolio showcasing projects, skills, and contact." />

    <!-- Preload the first background wallpaper at highest priority so it
         renders before JS loads, preventing a blank background on slow networks -->
    <link rel="preload" as="image" href="/images/wallpaper1.webp" fetchpriority="high" />

    <!-- DNS prefetch for Google Fonts so font requests start ASAP -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
